name: AI Security Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # 毎朝9時（JST）にも定期スキャン
  schedule:
    - cron: "0 0 * * *"
  # 手動実行も可能
  workflow_dispatch:
    inputs:
      mode:
        description: "監査モード (safe / deep / agent-audit)"
        required: false
        default: "deep"
      fail_on:
        description: "この severity 以上で失敗扱い (Critical / High / Medium)"
        required: false
        default: "High"

# PRに対してSARIF書き込み権限が必要
permissions:
  contents: read
  security-events: write

jobs:
  redteam-audit:
    name: Red Team Audit
    runs-on: ubuntu-latest

    steps:
      # ── セットアップ ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install click pydantic anthropic semgrep

      - name: Install Gitleaks
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d v)
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${VERSION}_linux_x64.tar.gz"
          sudo mv gitleaks /usr/local/bin/

      # ── baseline キャッシュ（patch モード用）──────────────────────
      - name: Restore baseline cache
        uses: actions/cache@v4
        with:
          path: .redteam-baseline.json
          key: redteam-baseline-${{ github.ref_name }}
          restore-keys: |
            redteam-baseline-main
            redteam-baseline-

      # ── 監査実行 ────────────────────────────────────────────────────
      - name: Run AI-Red-Teaming-Engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'deep' }}"
          FAIL_ON="${{ github.event.inputs.fail_on || 'High' }}"

          # baseline があれば patch モードで差分追跡
          BASELINE_OPT=""
          if [ -f ".redteam-baseline.json" ]; then
            BASELINE_OPT="--baseline .redteam-baseline.json --mode patch"
            echo "📋 baseline 検出 → patch モードで差分追跡"
          fi

          python engine.py \
            --dir . \
            --mode "$MODE" \
            --backend api \
            --format sarif \
            --output results.sarif \
            --save-baseline .redteam-baseline.json \
            --fail-on "$FAIL_ON" \
            --no-save-log \
            $BASELINE_OPT

      # ── baseline を次回のためにキャッシュ ─────────────────────────
      - name: Save baseline cache
        if: always()
        uses: actions/cache@v4
        with:
          path: .redteam-baseline.json
          key: redteam-baseline-${{ github.ref_name }}

      # ── SARIF アップロード（Security タブに表示）──────────────────
      - name: Upload SARIF to GitHub Security Tab
        if: always()   # 監査失敗（exit 1）でもアップロードする
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: ai-red-teaming-engine

      # ── アーティファクト保存 ────────────────────────────────────────
      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-report
          path: results.sarif
          retention-days: 30
